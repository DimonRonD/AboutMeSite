{% extends 'base.html' %}
{% block title %}Кейсы | AboutMe{% endblock %}

{% block content %}
<section class="container">
    <div class="text-center mb-5">
        <h1 class="fw-bold">Наши кейсы</h1>
        <p class="text-muted">5 примеров проектов, где мы помогли бизнесу достичь целей через технологии.</p>
    </div>

    <div class="row g-4">
        {% for case in cases %}
            <div class="col-md-6 col-xl-4">
                <article class="card case-card h-100 border-0 shadow-sm">
                    <img src="{{ url_for('static', filename=case.image) }}" class="card-img-top" alt="{{ case.title }}">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title">{{ case.title }}</h5>
                        <p class="card-text text-muted">{{ case.short_description }}</p>
                        <a href="{{ url_for('case_detail', case_id=case.id) }}" class="btn btn-outline-primary mt-auto">Подробнее</a>
                    </div>
                </article>
            </div>
        {% endfor %}
    </div>
</section>
{% endblock %}
