{% extends 'base.html' %}
{% block title %}{{ case.title }} | AboutMe{% endblock %}

{% block content %}
<section class="container">
    <div class="row g-4 align-items-center">
        <div class="col-lg-6">
            <img src="{{ url_for('static', filename=case.image) }}" class="img-fluid rounded-4 shadow-sm" alt="{{ case.title }}">
        </div>
        <div class="col-lg-6">
            <span class="badge text-bg-primary mb-3">Кейс #{{ case.id }}</span>
            <h1 class="fw-bold mb-3">{{ case.title }}</h1>
            <p class="text-muted fs-5">{{ case.full_description }}</p>
            <div class="d-flex gap-2 mt-4">
                <a href="{{ url_for('contact') }}" class="btn btn-primary">Обсудить похожий проект</a>
                <a href="{{ url_for('cases') }}" class="btn btn-outline-secondary">Назад к кейсам</a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
